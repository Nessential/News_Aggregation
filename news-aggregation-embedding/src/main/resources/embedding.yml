# Embedding 模块配置
embedding:
  zhipu:
    # 智谱 AI API 密钥，从 base.yml 中的配置获取
    api-key: ${news.aggregation.embedding.zhipu.api-key}
    # 智谱 AI API 基础 URL
    base-url: ${news.aggregation.embedding.zhipu.base-url}
    # 使用的 embedding 模型名称
    model: ${news.aggregation.embedding.zhipu.model}
    # 向量维度大小
    dimensions: ${news.aggregation.embedding.zhipu.dimensions}
    # HTTP 连接超时时间（毫秒）
    connect-timeout: ${news.aggregation.embedding.zhipu.connect-timeout}
    # HTTP 读取超时时间（毫秒）
    read-timeout: ${news.aggregation.embedding.zhipu.read-timeout}
    # 文本分段大小（字符数）
    chunk-size: ${news.aggregation.embedding.zhipu.chunk-size}
    # 相邻分段重叠字符数，用于保持上下文连贯性
    chunk-overlap: ${news.aggregation.embedding.zhipu.chunk-overlap}
    # 最小分段大小，小于此值的分段会被合并
    min-chunk-size: ${news.aggregation.embedding.zhipu.min-chunk-size}