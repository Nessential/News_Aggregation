# Spring Redis config (unified env-driven keys)
spring:
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: -1ms

# JetCache config
jetcache:
  statIntervalMinutes: 15
  hidePackages: com.example
  local:
    default:
      type: caffeine
      limit: 1000
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 300000
  remote:
    default:
      type: redisson
      keyConvertor: fastjson2
      valueEncoder: kryo
      valueDecoder: kryo
      poolConfig:
        minIdle: 5
        maxIdle: 20
        maxTotal: 50
      keyPrefix: "agent:"
