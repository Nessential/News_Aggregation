# 基础变量定义 - 所有中间件连接地址集中管理
news:
  aggregation:
    # MySQL配置
    mysql:
      url: jdbc:mysql://127.0.0.1:3306/news-aggregation
      username: root
      password: wangchuan
    # Redis配置
    redis:
      host: 127.0.0.1
      port: 6379
      password: ''
    # XXL-Job配置
    xxl-job:
      admin-addresses: http://127.0.0.1:8090/xxl-job-admin
      access-token: default_token
      executor-appname: news-aggregation-executor
      executor-port: 9999
      executor-ip: 127.0.0.1
      admin-timeout: 3
    # MinIO配置
    minio:
      endpoint: http://127.0.0.1:9000
      access-key: admin
      secret-key: Minio@123456
      bucket: news-image
    # 百度翻译配置
    translate:
      baidu:
        app-id: ${BAIDU_TRANSLATE_APP_ID:your-app-id}
        secret-key: ${BAIDU_TRANSLATE_SECRET_KEY:your-secret-key}
    # 智谱AI Embedding配置
    embedding:
      zhipu:
        api-key: ${ZHIPU_API_KEY}
        base-url: https://open.bigmodel.cn/api/paas/v4
        model: embedding-3
        dimensions: 2048
        connect-timeout: 10000
        read-timeout: 30000
        chunk-size: 500
        chunk-overlap: 50
        min-chunk-size: 100
    # Qdrant向量数据库配置
    qdrant:
      host: localhost
      port: 6334
      use-tls: false
      # 默认集合（向后兼容）
      collection-name: news_vectors
      vector-size: 2048
      api-key: ${QDRANT_API_KEY:}
      # 多集合配置
      collections:
        # 英文 Chunk 向量（用于 RAG 检索）
        chunks-en: news_chunks_en
        # 中文 Chunk 向量
        chunks-zh: news_chunks_zh
        # Topic 向量（用于 Story 归簾）
        topic-en: news_topic_en
        topic-zh: news_topic_zh
    # Elasticsearch配置
    elasticsearch:
      host: localhost
      port: 9200
      username: ''
      password: ''
      index-name: news
    # LLM统一配置
    llm:
      # 全局默认Provider
      default-provider: zhipu
      # 缓存配置
      cache:
        enabled: true
        local-expire-seconds: 300
        remote-expire-seconds: 3600
      # 场景配置
      scenes:
        router:
          provider: zhipu
          model: glm-4-flash
          temperature: 0.3
          max-tokens: 500
        generator:
          provider: zhipu
          model: glm-4
          temperature: 0.7
          max-tokens: 2048
        planner:
          provider: zhipu
          model: glm-4
          temperature: 0.5
          max-tokens: 1024
      # 智谱AI配置
      zhipu:
        enabled: true
        api-key: ${ZHIPU_API_KEY}
        base-url: https://open.bigmodel.cn/api/paas/v4
        models:
          chat: glm-4
          chat-lite: glm-4-flash
          embedding: embedding-3
        temperature: 0.7
        max-tokens: 2048
        connect-timeout: 10000
        read-timeout: 60000
        cost:
          chat-input: 0.0001
          chat-output: 0.0001
          embedding: 0.00005
      # OpenAI配置（预留）
      openai:
        enabled: false
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com/v1
        models:
          chat: gpt-4
          chat-lite: gpt-3.5-turbo
      # 本地模型配置（预留）
      local:
        enabled: false
        base-url: http://localhost:11434
        models:
          chat: llama2
