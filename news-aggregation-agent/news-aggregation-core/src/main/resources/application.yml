spring:
  application:
    name: news-aggregation-agent
  config:
    import:
      - classpath:base.yml
      - classpath:datasource.yml
      - classpath:cache.yml
      - classpath:elasticsearch.yml

server:
  port: 8085

# Resilience4j配置（阶段2用）
resilience4j:
  circuitbreaker:
    instances:
      llm:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 10s
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
  
  ratelimiter:
    instances:
      llm:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 3s
  
  retry:
    instances:
      llm:
        max-attempts: 3
        wait-duration: 1000

# 日志配置
logging:
  level:
    root: INFO
    com.example.news.aggregation: DEBUG
    com.alibaba.druid: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agent.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# 应用自定义配置
app:
  agent:
    session:
      ttl-hours: 24
      lock-timeout-seconds: 5
      lock-hold-seconds: 10
