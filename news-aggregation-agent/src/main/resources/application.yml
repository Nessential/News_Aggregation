server:
  port: 8084

spring:
  application:
    name: news-aggregation-agent
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
      - classpath:base.yml
      - classpath:cache.yml
      - classpath:datasource.yml
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        model: ${DASHSCOPE_AGENT_CHAT_MODEL:qwen3.5-plus}
        temperature: ${DASHSCOPE_AGENT_CHAT_TEMPERATURE:0.7}

embedding:
    api-key: ${ZHIPU_API_KEY}
    base-url: ${ZHIPU_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    model: ${ZHIPU_EMBEDDING_MODEL:embedding-3}
    dimensions: ${ZHIPU_EMBEDDING_DIMENSIONS:2048}
    connect-timeout: ${ZHIPU_CONNECT_TIMEOUT:10000}
    read-timeout: ${ZHIPU_READ_TIMEOUT:30000}
    chunk-size: 500
    chunk-overlap: 50
    min-chunk-size: 100

# XXL-Job 占位配置（agent 当前不启用 job）
xxl:
  job:
    admin:
      addresses: ${news.aggregation.xxl-job.admin-addresses}
    access-token: ${news.aggregation.xxl-job.access-token}
    executor:
      appname: ${news.aggregation.xxl-job.executor-appname}
      port: ${news.aggregation.xxl-job.executor-port}
      ip: ${news.aggregation.xxl-job.executor-ip}
      logpath: logs/xxl-job
      logretentiondays: 30

app:
  cors:
    enabled: ${APP_CORS_ENABLED:false}
  auth:
    enforce: ${APP_AUTH_ENFORCE:true}
    user-id-header: ${APP_AUTH_USER_ID_HEADER:X-User-Id}
    protected-path-prefix: /api/agent
  feature-quota:
    enabled: ${APP_FEATURE_QUOTA_ENABLED:true}
    fail-open: ${APP_FEATURE_QUOTA_FAIL_OPEN:true}
    redis-prefix: ${APP_FEATURE_QUOTA_REDIS_PREFIX:quota:daily}
    zone-id: ${APP_FEATURE_QUOTA_ZONE_ID:Asia/Shanghai}
    features:
      chat:
        enabled: ${APP_FEATURE_QUOTA_CHAT_ENABLED:true}
        daily-limit: ${APP_FEATURE_QUOTA_CHAT_DAILY_LIMIT:5}
  rpc:
    enabled: ${APP_RPC_ENABLED:true}
  news:
    retrieval:
      base-url: http://localhost:8092
    base-url: http://localhost:8092

  llm:
    mock-mode: false
    base-url: http://localhost:8081
    router:
      base-url: http://localhost:8081

  qdrant:
    collection-name: ${news.aggregation.qdrant.collections.chunks-en}
    host: ${news.aggregation.qdrant.host}
    port: ${news.aggregation.qdrant.port}

  elasticsearch:
    index-name: ${news.aggregation.elasticsearch.index-name}

  agent:
    # SpringAI Alibaba 改造开关（A 阶段）
    planner:
      mode: hybrid
    tool:
      binding:
        mode: spring_tool

    replan:
      enabled: true
      max-replans-per-run: 2
      max-replans-per-step: 1
      min-source-count: 3
      min-coverage-rate: 0.6
      min-cluster-count: 1
      non-retryable-reason-codes:
        - policy_quota_auth
        - replan_non_retryable_reason
      evidence:
        search_news:
          enabled: true
          min-source-count: 3
          min-coverage-rate: 0.6
          min-cluster-count: 1
        retrieve_news:
          enabled: true
          min-source-count: 3
          min-coverage-rate: 0.5
          min-cluster-count: 1
        llm_generate:
          enabled: false

    execution:
      schema-version: execution-plan/1.0
      semantic-version: 1.0.0
      persistence:
        enabled: true
        worker-id: ${AGENT_EXECUTION_WORKER_ID:${HOSTNAME:local-worker}}
        step-lease-seconds: 30
        heartbeat-seconds: 10
        takeover-enabled: true
      dedupe:
        include-plan-hash: true
      recovery:
        enabled: true
        scan-interval-ms: 15000
        scan-batch-size: 100
        max-recovery-attempts: 5
      effect-query:
        enabled: false
        connect-timeout-ms: 1500
        read-timeout-ms: 2000
        allowed-hosts: []

    schema-validation:
      enabled: true
      mode: STRICT
      default-schema-version: execution-plan/1.0
      supported-schema-versions:
        - execution-plan/1.0
      compatibility-tools: []
      optional-output-fields-by-tool:
        llm_generate:
          - citations
      global-max-retries: 2
      tool-default-max-retries:
        search_news: 2
        retrieve_news: 2
        llm_generate: 1
      tool-default-fallbacks:
        search_news:
          - retrieve_news
      global-fallback-tools: []
      quality-gate-enabled: true

    tool-selector:
      enabled: true
      circuit-enabled: true
      health-window-size: 20
      health-min-samples: 5
      primary-infra-fail-rate-threshold: 0.6
      primary-infra-fail-count-threshold: 3
      circuit-open-seconds: 30
      half-open-owner-lease-seconds: 10
      cas-max-retries: 3
      capability-fallbacks: {}

    replay:
      api-enabled: true
      default-event-limit: 100
      max-event-limit: 500
      raw-payload-enabled: false
      payload-mask-max-length: 256
      default-tenant-id: default

    session:
      timeout-minutes: 30
      max-history-size: 50
      redis-key-prefix: "session:"
      lock-owner-ttl-seconds: 300
      watchdog-timeout-ms: 90000

    pipeline:
      default-top-k: 10
      max-candidates: 50
      timeout-seconds: 30

    retry:
      max-attempts: 3
      backoff-ms: 1000

    fallback:
      enabled: true
      default-message: "系统当前繁忙，请稍后再试。"

    chat-history:
      enabled: true
      max-keep-turns: 50
      llm-prompt-turns: 5
      retention-days: 90
      cleanup-cron: "0 0 3 * * ?"

logging:
  level:
    com.example.news.aggregation.agent: DEBUG
    com.example.news.aggregation.llm: DEBUG
    com.example.news.aggregation.news: INFO
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: -1
  registry:
    address: nacos://${NACOS_ADDR:localhost:8849}
    username: ${NACOS_USERNAME:}
    password: ${NACOS_PASSWORD:}
    parameters:
      namespace: ${NACOS_NAMESPACE:news-agent}
      register-consumer-url: true
  consumer:
    filter: userContextConsumer
    check: false
    timeout: 8000
    retries: 0
