server:
  port: 8081 # LLM服务独立端口

spring:
  application:
    name: news-aggregation-llm-spring-ai
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      chat:
        model: qwen3.5-flash
        temperature: 0.7
        max-tokens: 10000
      embedding:
        model: text-embedding-v2

    # Nacos MCP配置（预留，MVP未启用）
    nacos:
      mcp:
        server:
          enabled: true
          server-addr: ${NACOS_ADDR:localhost:8849}
          username: ${NACOS_USERNAME:}
          password: ${NACOS_PASSWORD:}
          namespace: ${NACOS_NAMESPACE:news-agent}
          group-id: ${NACOS_MCP_GROUP_ID:MCP_TOOLS}
        client:
          enabled: true
          server-addr: ${NACOS_ADDR:localhost:8849}
          username: ${NACOS_USERNAME:}
          password: ${NACOS_PASSWORD:}
          namespace: ${NACOS_NAMESPACE:news-agent}

# LLM应用配置
app:
  llm:
    planner:
      schema-version: execution-plan/1.0
      semantic-version: 1.0.0
      decision-table-version: 1.0.0
      resource-estimation:
        type-time-map:
          SEARCH: 2
          RETRIEVE: 3
          SUMMARIZE: 5
          COMPARE: 7
          ANALYZE: 10
          TIMELINE: 8
          DEEP_DIVE: 10
        type-tools-map:
          SEARCH: [search_news]
          RETRIEVE: [retrieve_news, rerank_results]
          SUMMARIZE: [llm_generate]
          COMPARE: [llm_generate]
          ANALYZE: [llm_generate]
          TIMELINE: [llm_generate]
          DEEP_DIVE: [llm_generate]
    # Graph执行配置
    graph:
      router-enabled: true
      planner-enabled: true
      generator-enabled: true
      timeout-seconds: 30
      max-iterations: 5
      checkpoint-enabled: false

    # Mock模式开关（true=使用Mock数据，false=真实查询）
    mock-mode: ${MOCK_MODE:false}

    # Qdrant向量数据库配置
    qdrant:
      collection-name: ${QDRANT_COLLECTION:news_chunks_zh}

    # Elasticsearch配置
    elasticsearch:
      index-name: ${ES_INDEX:news_articles}

    # 意图识别配置
    intent:
      rules-path: classpath:intent/intent-rules.yml
    prompts:
      base-path: classpath:prompts/
      suffix: .txt

    # MCP工具配置
    mcp:
      local-tools-enabled: true
      nacos-registry-enabled: true
      auto-discover: true
      # 工具特定配置
      tool:
        retrieval:
          default-top-k: 10
          max-top-k: 50
          min-similarity: 0.5
        rerank:
          default-top-n: 5
          max-top-n: 20
          diversity-enabled: true
          diversity-weight: 0.3

# 日志配置
logging:
  level:
    com.alibaba.cloud.ai: DEBUG
    com.example.news.aggregation.llm.springai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: ${DUBBO_PORT:20881}
  registry:
    address: nacos://${NACOS_ADDR:localhost:8849}
    username: ${NACOS_USERNAME:}
    password: ${NACOS_PASSWORD:}
    parameters:
      namespace: ${NACOS_NAMESPACE:news-agent}
  provider:
    filter: userContextProvider
  consumer:
    check: false
