# RSS 源配置
news:
  rss:
    # URL 中包含以下关键词时跳过抓取（可继续扩展）
    skip-url-keywords:
      - video
      - iplayer
      - sounds
    sources:
      - name: BBC
        url: https://feeds.bbci.co.uk/news/rss.xml
        category-id: 1
        category: Hot
        max-items: 1
      - name: BBC
        url: https://feeds.bbci.co.uk/news/world/rss.xml
        category-id: 2
        category: world
        max-items: 1
      - name: BBC
        url: https://feeds.bbci.co.uk/news/business/rss.xml
        category-id: 3
        category: business
        max-items: 1
      - name: BBC
        url: https://feeds.bbci.co.uk/news/politics/rss.xml
        category-id: 4
        category: politics
        max-items: 1
      - name: BBC
        url: https://feeds.bbci.co.uk/news/technology/rss.xml
        category-id: 5
        category: technology
        max-items: 1
      - name: ABC
        url: https://feeds.abcnews.com/abcnews/topstories
        category-id: 1
        category: Hot
        max-items: 1
      - name: ABC
        url: https://abcnews.com/abcnews/internationalheadlines
        category-id: 2
        category: world
        max-items: 1
      - name: ABC
        url: https://abcnews.com/abcnews/politicsheadlines
        category-id: 4
        category: politics
        max-items: 1
      - name: ABC
        url: https://abcnews.com/abcnews/moneyheadlines
        category-id: 3
        category: business
        max-items: 1
      - name: ABC
        url: https://abcnews.com/abcnews/technologyheadlines
        category-id: 5
        category: technology
        max-items: 1
      - name: TheVerge
        url: https://www.theverge.com/rss/partner/subscriber-only-full-feed/rss.xml
        category-id: 5
        category: technology
        max-items: 1
      - name: Engadget
        url: https://www.engadget.com/rss.xml
        category-id: 5
        category: technology
        max-items: 1
      - name: Al Jazeera
        url: https://www.aljazeera.com/xml/rss/all.xml
        category-id: 2
        category: world
        default-image-url: https://www.aljazeera.com/images/logo_aje.png
        max-items: 1

# 百度翻译配置
translate:
  baidu:
    app-id: ${news.aggregation.translate.baidu.app-id}
    secret-key: ${news.aggregation.translate.baidu.secret-key}
    api-url: https://fanyi-api.baidu.com/api/trans/vip/translate

# Story 归档配置
story:
  time-window-days: 7
  similarity-threshold: 0.90

# Embedding 配置
embedding:
  chunk-size: 500
  chunk-overlap: 50
  min-chunk-size: 100

# Qdrant 配置
vector:
  host: localhost
  port: 6333
  vector-size: 2048

# 短信认证配置（阿里云 Dypnsapi）
sms:
  aliyun:
    # 是否启用阿里云短信认证，false 时走本地调试验证码（mock-code）
    enabled: true
    endpoint: ${SMS_ALIYUN_ENDPOINT:dypnsapi.aliyuncs.com}
    scheme-name: 登录/注册模板
    sign-name: ${SMS_ALIYUN_SIGN_NAME:速通互联验证码}
    template-code: ${SMS_ALIYUN_TEMPLATE_CODE:100001}
    template-param: '${SMS_ALIYUN_TEMPLATE_PARAM:{"code":"##code##","min":"5"}}'
    country-code: ${SMS_ALIYUN_COUNTRY_CODE:86}
    code-length: ${SMS_ALIYUN_CODE_LENGTH:6}
    valid-time-seconds: ${SMS_ALIYUN_VALID_TIME_SECONDS:60}
    resend-interval-seconds: ${SMS_ALIYUN_RESEND_INTERVAL_SECONDS:60}
    rate-limit-window-seconds: ${SMS_ALIYUN_RATE_LIMIT_WINDOW_SECONDS:60}
    rate-limit-max-requests: ${SMS_ALIYUN_RATE_LIMIT_MAX_REQUESTS:1}
    mock-code: ${SMS_ALIYUN_MOCK_CODE:123456}

# Token 配置
app:
  feature-quota:
    enabled: ${APP_FEATURE_QUOTA_ENABLED:true}
    fail-open: ${APP_FEATURE_QUOTA_FAIL_OPEN:true}
    redis-prefix: ${APP_FEATURE_QUOTA_REDIS_PREFIX:quota:daily}
    zone-id: ${APP_FEATURE_QUOTA_ZONE_ID:Asia/Shanghai}
    features:
      chat:
        enabled: ${APP_FEATURE_QUOTA_CHAT_ENABLED:true}
        daily-limit: ${APP_FEATURE_QUOTA_CHAT_DAILY_LIMIT:1}
  token:
    expire-hours: ${APP_TOKEN_EXPIRE_HOURS:24}
