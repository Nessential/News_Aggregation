spring:
  application:
    name: news-aggregation-app
  config:
    import:
      # 允许从 .env 加载 key=value 配置（按工作目录兼容多路径）
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
      - classpath:base.yml
      - classpath:datasource.yml
      - classpath:cache.yml
      - classpath:xxl-job.yml
      - classpath:storage.yml
      - classpath:elasticsearch.yml
      - classpath:news.yml
      - classpath:embedding.yml
      - classpath:vector.yml

server:
  port: 8080

# MyBatis配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: ${DUBBO_PORT:20880}
  registry:
    address: nacos://${NACOS_ADDR:localhost:8848}
    parameters:
      namespace: ${NACOS_NAMESPACE:news-agent}
  consumer:
    check: false

