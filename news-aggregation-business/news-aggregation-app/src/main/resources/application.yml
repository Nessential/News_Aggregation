spring:
  application:
    name: news-aggregation-app
  config:
    import:
      # 鍏佽浠?.env 鍔犺浇 key=value 閰嶇疆锛堟寜宸ヤ綔鐩綍鍏煎澶氳矾寰勶級
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
      - classpath:base.yml
      - classpath:datasource.yml
      - classpath:cache.yml
      - classpath:xxl-job.yml
      - classpath:storage.yml
      - classpath:elasticsearch.yml
      - classpath:news.yml
      - classpath:embedding.yml
      - classpath:vector.yml

server:
  port: 8092


app:
  cors:
    enabled: ${APP_CORS_ENABLED:false}

# MyBatis
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml

dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: tri
    port: ${DUBBO_PORT:20880}
  registry:
    address: nacos://${NACOS_ADDR:localhost:8849}
    username: ${NACOS_USERNAME:}
    password: ${NACOS_PASSWORD:}
    parameters:
      namespace: ${NACOS_NAMESPACE:news-agent}
  provider:
    filter: userContextProvider
  consumer:
    check: false
