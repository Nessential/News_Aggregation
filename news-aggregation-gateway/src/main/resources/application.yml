server:
  port: 8091

spring:
  application:
    name: news-aggregation-gateway
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=X-User-Id
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://127.0.0.1:5173"
                  - "http://localhost/"
                allowedMethods: "*"
                allowedHeaders: "*"
      routes:
        - id: user-auth-api
          uri: http://localhost:8092
          predicates:
            - Path=/api/user/auth/**
        - id: news-api
          uri: http://localhost:8092
          predicates:
            - Path=/api/news/**
        - id: agent-api
          uri: http://localhost:8084
          predicates:
            - Path=/api/agent/**
        - id: execution-api
          uri: http://localhost:8084
          predicates:
            - Path=/api/execution/**

app:
  auth:
    enabled: ${GATEWAY_AUTH_ENABLED:true}
    user-id-header: X-User-Id
    skip-paths:
      - /api/user/auth/sms/send-code
      - /api/user/auth/sms/login
      - /api/news/**
      - /api/news/categories/**
    token:
      aes-key: ${TOKEN_AES_KEY:tokenbynfturbo_0}
      redis-prefix: ${TOKEN_REDIS_PREFIX:token:login:}
      ttl-seconds: ${TOKEN_TTL_SECONDS:86400}

logging:
  level:
    com.example.news.aggregation.gateway: INFO
