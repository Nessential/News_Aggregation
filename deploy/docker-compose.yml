services:
  mysql:
    image: mysql:8.4
    container_name: news-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - /data/mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - news-net

  redis:
    image: redis:8.4
    container_name: news-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --aclfile
      - /etc/redis/users.acl
    ports:
      - "6379:6379"
    volumes:
      - /data/redis:/data
      - /root/redis/users.acl:/etc/redis/users.acl:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --user root -a root ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - news-net

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: news-nacos
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: ${NACOS_DB_NAME}
      MYSQL_SERVICE_USER: ${NACOS_DB_USER}
      MYSQL_SERVICE_PASSWORD: ${NACOS_DB_PASSWORD}
      MYSQL_SERVICE_DB_PARAM: ${NACOS_DB_PARAM}
      JVM_XMS: ${NACOS_JVM_XMS}
      JVM_XMX: ${NACOS_JVM_XMX}
      JVM_XMN: ${NACOS_JVM_XMN}
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
      - "8080:8080"
    volumes:
      - /data/nacos/logs:/home/nacos/logs
      - /data/nacos/data:/home/nacos/data
    mem_limit: 1536m
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - news-net

  elasticsearch:
    image: elasticsearch:8.19.9
    container_name: news-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - /data/elasticsearch:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    mem_limit: 4g
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "3"
      # Install IK plugin
    entrypoint: |
      /bin/bash -c "bin/elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.19.9.zip && exec /usr/local/bin/docker-entrypoint.sh"
    networks:
      - news-net

  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: news-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /data/qdrant:/qdrant/storage
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - news-net

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:3.3.0
    container_name: news-xxl-job
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      PARAMS: >-
        --server.port=8090
        --server.servlet.context-path=${XXL_JOB_CONTEXT_PATH}
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai&useSSL=false
        --spring.datasource.username=${XXL_JOB_DB_USERNAME}
        --spring.datasource.password=${XXL_JOB_DB_PASSWORD}
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN}
      TZ: Asia/Shanghai
    networks:
      - news-net

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z-cpuv1
    container_name: news-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: http://你的服务器IP:9001
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /data/minio:/data
    command: server /data --console-address :9001
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
networks:
  news-net:
    driver: bridge